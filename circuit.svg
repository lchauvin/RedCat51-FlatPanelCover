<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="760" viewBox="0 0 1100 760">
  <style>
    text { font-family: monospace, monospace; }
  </style>

  <!-- Background -->
  <rect width="1100" height="760" fill="#f9f9f9"/>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">RedCat 51 Flat Panel — Wiring Diagram</text>

  <!-- ═══════════════════ POWER RAILS ═══════════════════ -->
  <!-- +5V rail (red, top) -->
  <line x1="160" y1="68" x2="1060" y2="68" stroke="#cc0000" stroke-width="4"/>
  <text x="88"  y="73" font-size="13" font-weight="bold" fill="#cc0000">+ 5 V</text>
  <!-- GND rail (black, bottom) -->
  <line x1="160" y1="692" x2="1060" y2="692" stroke="#222" stroke-width="4"/>
  <text x="88"  y="697" font-size="13" font-weight="bold" fill="#222">GND</text>

  <!-- ═══════════════════ ARDUINO MEGA 2560 ═══════════════════ -->
  <rect x="50" y="118" width="175" height="500" rx="8"
        fill="#3a7dc9" fill-opacity="0.10" stroke="#3a7dc9" stroke-width="2"/>
  <text x="137" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#3a7dc9">Arduino Mega</text>
  <text x="137" y="156" text-anchor="middle" font-size="11"              fill="#3a7dc9">2560</text>

  <!-- Pin dots on RIGHT edge (x=225) -->
  <!-- +5V -->
  <circle cx="225" cy="192" r="4" fill="#cc0000"/>
  <text x="211" y="196" text-anchor="end" font-size="11" fill="#cc0000">+5V</text>
  <!-- GND -->
  <circle cx="225" cy="572" r="4" fill="#222"/>
  <text x="208" y="576" text-anchor="end" font-size="11" fill="#222">GND</text>
  <!-- Pin 9 — 25 kHz PWM for LED -->
  <circle cx="225" cy="490" r="5" fill="#880088"/>
  <text x="208" y="487" text-anchor="end" font-size="11" fill="#880088">Pin 9</text>
  <text x="60"  y="503" font-size="9"  fill="#880088">(25 kHz PWM)</text>
  <!-- Stepper control pins -->
  <circle cx="225" cy="270" r="4" fill="#1155bb"/>
  <text x="208" y="274" text-anchor="end" font-size="11" fill="#1155bb">Pin 22</text>
  <circle cx="225" cy="304" r="4" fill="#1155bb"/>
  <text x="208" y="308" text-anchor="end" font-size="11" fill="#1155bb">Pin 24</text>
  <circle cx="225" cy="338" r="4" fill="#1155bb"/>
  <text x="208" y="342" text-anchor="end" font-size="11" fill="#1155bb">Pin 26</text>
  <circle cx="225" cy="372" r="4" fill="#1155bb"/>
  <text x="208" y="376" text-anchor="end" font-size="11" fill="#1155bb">Pin 28</text>

  <!-- Arduino 5V → rail (dashed) -->
  <line x1="225" y1="188" x2="225" y2="68" stroke="#cc0000" stroke-width="2" stroke-dasharray="5,3"/>
  <circle cx="225" cy="68" r="5" fill="#cc0000"/>
  <!-- Arduino GND → rail (dashed) -->
  <line x1="225" y1="576" x2="225" y2="692" stroke="#222" stroke-width="2" stroke-dasharray="5,3"/>
  <circle cx="225" cy="692" r="5" fill="#222"/>

  <!-- ═══════════════════ ULN2003 DRIVER BOARD ═══════════════════ -->
  <rect x="365" y="193" width="155" height="222" rx="8"
        fill="#3a8c3f" fill-opacity="0.10" stroke="#3a8c3f" stroke-width="2"/>
  <text x="442" y="213" text-anchor="middle" font-size="13" font-weight="bold" fill="#3a8c3f">ULN2003</text>
  <text x="442" y="228" text-anchor="middle" font-size="11"              fill="#3a8c3f">Driver Board</text>

  <!-- IN pins (left edge, x=365) -->
  <circle cx="365" cy="263" r="4" fill="#1155bb"/> <text x="370" y="267" font-size="10" fill="#222">IN1</text>
  <circle cx="365" cy="297" r="4" fill="#1155bb"/> <text x="370" y="301" font-size="10" fill="#222">IN2</text>
  <circle cx="365" cy="331" r="4" fill="#1155bb"/> <text x="370" y="335" font-size="10" fill="#222">IN3</text>
  <circle cx="365" cy="365" r="4" fill="#1155bb"/> <text x="370" y="369" font-size="10" fill="#222">IN4</text>

  <!-- OUT pins (right edge, x=520) -->
  <circle cx="520" cy="263" r="4" fill="#cc5500"/> <text x="526" y="267" font-size="10" fill="#222">OUT1</text>
  <circle cx="520" cy="297" r="4" fill="#cc8800"/> <text x="526" y="301" font-size="10" fill="#222">OUT2</text>
  <circle cx="520" cy="331" r="4" fill="#1144bb"/> <text x="526" y="335" font-size="10" fill="#222">OUT3</text>
  <circle cx="520" cy="365" r="4" fill="#880088"/> <text x="526" y="369" font-size="10" fill="#222">OUT4</text>

  <!-- +5V / GND on board -->
  <circle cx="442" cy="398" r="4" fill="#cc0000"/>
  <text x="452" y="402" font-size="10" fill="#cc0000">+5V</text>
  <circle cx="442" cy="418" r="4" fill="#222"/>
  <text x="452" y="422" font-size="10" fill="#222">GND</text>

  <!-- ULN2003 5V → rail -->
  <line x1="442" y1="394" x2="442" y2="68" stroke="#cc0000" stroke-width="2" stroke-dasharray="5,3"/>
  <circle cx="442" cy="68" r="5" fill="#cc0000"/>
  <!-- ULN2003 GND → rail -->
  <line x1="442" y1="422" x2="442" y2="692" stroke="#222" stroke-width="2" stroke-dasharray="5,3"/>
  <circle cx="442" cy="692" r="5" fill="#222"/>

  <!-- Arduino pins 22-28 → ULN2003 IN1-4 (blue signal wires) -->
  <line x1="225" y1="270" x2="365" y2="263" stroke="#1155bb" stroke-width="1.5"/>
  <line x1="225" y1="304" x2="365" y2="297" stroke="#1155bb" stroke-width="1.5"/>
  <line x1="225" y1="338" x2="365" y2="331" stroke="#1155bb" stroke-width="1.5"/>
  <line x1="225" y1="372" x2="365" y2="365" stroke="#1155bb" stroke-width="1.5"/>

  <!-- ═══════════════════ 28BYJ-48 STEPPER MOTOR ═══════════════════ -->
  <rect x="692" y="175" width="188" height="215" rx="8"
        fill="#cc6600" fill-opacity="0.12" stroke="#cc6600" stroke-width="2"/>
  <text x="786" y="196" text-anchor="middle" font-size="13" font-weight="bold" fill="#cc6600">28BYJ-48</text>
  <text x="786" y="211" text-anchor="middle" font-size="11"              fill="#cc6600">Stepper Motor</text>
  <!-- Wire colour legend -->
  <circle cx="700" cy="242" r="4" fill="#cc0000"/>
  <text x="710" y="246" font-size="10" fill="#cc0000">Red    → +5V (VCC)</text>
  <circle cx="700" cy="265" r="4" fill="#cc5500"/>
  <text x="710" y="269" font-size="10" fill="#cc5500">Orange → OUT1</text>
  <circle cx="700" cy="288" r="4" fill="#cc8800"/>
  <text x="710" y="292" font-size="10" fill="#cc8800">Yellow → OUT2</text>
  <circle cx="700" cy="311" r="4" fill="#1144bb"/>
  <text x="710" y="315" font-size="10" fill="#1144bb">Blue   → OUT3</text>
  <circle cx="700" cy="334" r="4" fill="#880088"/>
  <text x="710" y="338" font-size="10" fill="#880088">Pink   → OUT4</text>
  <!-- Note: ULN2003 board usually ships with a direct 5-pin connector to the stepper -->
  <text x="786" y="368" text-anchor="middle" font-size="9" fill="#666">board includes direct connector</text>
  <text x="786" y="380" text-anchor="middle" font-size="9" fill="#666">to stepper (white 5-pin plug)</text>

  <!-- Stepper VCC → 5V rail -->
  <line x1="700" y1="242" x2="672" y2="242" stroke="#cc0000" stroke-width="2"/>
  <line x1="672" y1="242" x2="672" y2="68"  stroke="#cc0000" stroke-width="2"/>
  <circle cx="672" cy="68" r="5" fill="#cc0000"/>

  <!-- ULN2003 OUT1-4 → stepper (colour-coded wires) -->
  <line x1="520" y1="263" x2="700" y2="265" stroke="#cc5500" stroke-width="2"/>
  <line x1="520" y1="297" x2="700" y2="288" stroke="#cc8800" stroke-width="2"/>
  <line x1="520" y1="331" x2="700" y2="311" stroke="#1144bb" stroke-width="2"/>
  <line x1="520" y1="365" x2="700" y2="334" stroke="#880088" stroke-width="2"/>

  <!-- ═══════════════════ IRLZ44N MOSFET ═══════════════════ -->
  <rect x="365" y="465" width="155" height="140" rx="8"
        fill="#7b2d8b" fill-opacity="0.12" stroke="#7b2d8b" stroke-width="2"/>
  <text x="442" y="485" text-anchor="middle" font-size="13" font-weight="bold" fill="#7b2d8b">IRLZ44N</text>
  <text x="442" y="500" text-anchor="middle" font-size="11"              fill="#7b2d8b">N-ch MOSFET</text>

  <!-- Terminal labels inside box -->
  <text x="373" y="532" font-size="10" fill="#222">● G (Gate)</text>
  <text x="373" y="556" font-size="10" fill="#222">● S (Source) → GND</text>
  <text x="460" y="598" font-size="10" fill="#222">D (Drain) ●</text>

  <!-- MOSFET terminal dots -->
  <circle cx="365" cy="528" r="4" fill="#880088"/>  <!-- Gate -->
  <circle cx="365" cy="552" r="4" fill="#222"/>      <!-- Source -->
  <circle cx="520" cy="594" r="4" fill="#227722"/>   <!-- Drain -->

  <!-- ── Gate circuit: Pin 9 → 220Ω → Gate, Gate → 10kΩ → GND ── -->
  <!-- Route: Pin 9 (225,490) right to x=310, down to gate junction (310,528) -->
  <line x1="225" y1="490" x2="310" y2="490" stroke="#880088" stroke-width="1.5"/>
  <line x1="310" y1="490" x2="310" y2="516" stroke="#880088" stroke-width="1.5"/>

  <!-- 220Ω resistor body (vertical, between y=516 and y=540) -->
  <rect x="298" y="516" width="24" height="28" rx="3" fill="white" stroke="#555" stroke-width="1.5"/>
  <text x="310" y="527" text-anchor="middle" font-size="8" fill="#555">220</text>
  <text x="310" y="538" text-anchor="middle" font-size="8" fill="#555">Ω</text>

  <!-- Wire from 220Ω to MOSFET Gate junction (310,544) → (365,528) -->
  <line x1="310" y1="544" x2="310" y2="560" stroke="#880088" stroke-width="1.5"/>
  <!-- Gate junction dot -->
  <circle cx="310" cy="560" r="3" fill="#880088"/>
  <!-- Junction to Gate pin -->
  <line x1="310" y1="560" x2="365" y2="528" stroke="#880088" stroke-width="1.5"/>

  <!-- 10kΩ pull-down: junction (310,560) → resistor → GND rail -->
  <line x1="310" y1="560" x2="310" y2="590" stroke="#222" stroke-width="1.5"/>
  <!-- 10kΩ resistor body (vertical, y=590 to y=628) -->
  <rect x="298" y="590" width="24" height="34" rx="3" fill="white" stroke="#555" stroke-width="1.5"/>
  <text x="310" y="601" text-anchor="middle" font-size="8" fill="#555">10k</text>
  <text x="310" y="613" text-anchor="middle" font-size="8" fill="#555">Ω</text>
  <line x1="310" y1="624" x2="310" y2="692" stroke="#222" stroke-width="1.5"/>
  <circle cx="310" cy="692" r="5" fill="#222"/>

  <!-- Source to GND -->
  <line x1="365" y1="552" x2="340" y2="552" stroke="#222" stroke-width="1.5"/>
  <line x1="340" y1="552" x2="340" y2="692" stroke="#222" stroke-width="1.5"/>
  <circle cx="340" cy="692" r="5" fill="#222"/>

  <!-- ═══════════════════ COB LED STRIP ═══════════════════ -->
  <rect x="692" y="456" width="210" height="128" rx="8"
        fill="#e6c232" fill-opacity="0.18" stroke="#b8960a" stroke-width="2"/>
  <text x="797" y="478" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5f00">COB LED Strip</text>
  <text x="797" y="494" text-anchor="middle" font-size="10"              fill="#7a5f00">5V USB · 6500K · 8W/m · CRI90</text>

  <circle cx="700" cy="522" r="4" fill="#cc0000"/>
  <text x="710" y="526" font-size="10" fill="#cc0000">+ (USB 5V — own USB cable)</text>
  <circle cx="700" cy="550" r="4" fill="#227722"/>
  <text x="710" y="554" font-size="10" fill="#227722">− (splice → MOSFET Drain)</text>
  <text x="797" y="578" text-anchor="middle" font-size="9" fill="#555">Leave inline switch permanently ON</text>

  <!-- LED (+) → 5V rail (its own USB cable — shown as dashed going to 5V) -->
  <line x1="700" y1="522" x2="648" y2="522" stroke="#cc0000" stroke-width="2"/>
  <line x1="648" y1="522" x2="648" y2="68"  stroke="#cc0000" stroke-width="2" stroke-dasharray="5,3"/>
  <circle cx="648" cy="68" r="5" fill="#cc0000"/>
  <!-- "own USB" label on the dashed line -->
  <text x="637" y="360" font-size="9" fill="#888" transform="rotate(-90,637,360)">LED strip USB cable (separate)</text>

  <!-- Drain (520,594) → right → LED (−) (700,550) -->
  <line x1="520" y1="594" x2="620" y2="594" stroke="#227722" stroke-width="2"/>
  <line x1="620" y1="594" x2="620" y2="550" stroke="#227722" stroke-width="2"/>
  <line x1="620" y1="550" x2="700" y2="550" stroke="#227722" stroke-width="2"/>

  <!-- ═══════════════════ NOTES BOX ═══════════════════ -->
  <rect x="50" y="645" width="500" height="96" rx="6" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="60"  y="663" font-size="11" font-weight="bold" fill="#333">Assembly notes</text>
  <text x="60"  y="679" font-size="10" fill="#555">• LED strip powered from its own USB cable → PC USB 3.0 port (≥900 mA)</text>
  <text x="60"  y="694" font-size="10" fill="#555">• Splice MOSFET drain into the LED strip's USB ground wire</text>
  <text x="60"  y="709" font-size="10" fill="#555">• Arduino powered via separate USB cable → PC</text>
  <text x="60"  y="724" font-size="10" fill="#555">• All GND lines share the common rail (tie USB cable grounds together)</text>

  <rect x="560" y="645" width="490" height="96" rx="6" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="570" y="663" font-size="11" font-weight="bold" fill="#333">Stepper wiring (28BYJ-48 → ULN2003)</text>
  <text x="570" y="679" font-size="10" fill="#555">• Plug the 5-pin white connector directly into the ULN2003 board</text>
  <text x="570" y="694" font-size="10" fill="#555">• ULN2003 IN1–IN4 → Arduino pins 22, 24, 26, 28</text>
  <text x="570" y="709" font-size="10" fill="#555">• Timer2 (pin 9) drives MOSFET at 25 kHz — eliminates flat-frame banding</text>
  <text x="570" y="724" font-size="10" fill="#555">• IRLZ44N: G=220Ω from pin9, G→GND=10kΩ pull-down, S=GND, D=LED−</text>
</svg>
